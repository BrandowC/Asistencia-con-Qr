services:
  mongo:
    image: mongo:7
    container_name: app_attendance_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${APP_ATTENDANCE_DB_NAME}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - app_attendance_mongo_data:/data/db
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: app_attendance_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-4000}
      API_HOST: 0.0.0.0
      MONGO_URI: ${MONGO_URI}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS}
      QR_DEFAULT_TTL_MINUTES: ${QR_DEFAULT_TTL_MINUTES}
      ROOM_CODE_TTL_SECONDS: ${ROOM_CODE_TTL_SECONDS}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      BOOTSTRAP_INSTITUTION_CODE: ${BOOTSTRAP_INSTITUTION_CODE:-INST-001}
      BOOTSTRAP_INSTITUTION_NAME: ${BOOTSTRAP_INSTITUTION_NAME:-Institución inicial}
      BOOTSTRAP_INSTITUTION_CONTEXT: ${BOOTSTRAP_INSTITUTION_CONTEXT:-UNIVERSIDAD}
      ADMIN_DOCUMENTO: ${ADMIN_DOCUMENTO:-admin}
      ADMIN_NOMBRE: ${ADMIN_NOMBRE:-Administrador}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-cambiar-en-primer-login}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      mongo:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
    container_name: app_attendance_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  app_attendance_mongo_data:
    name: app_attendance_mongo_data
